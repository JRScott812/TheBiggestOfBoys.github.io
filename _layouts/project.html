---
layout: default
---

<article class="project">
	<h1>{{ page.title }}</h1>
	{% if page.image %}
	<img src="{{ page.image }}" alt="{{ page.title }} image" />
	{% endif %}
	<div class="project-body">
		{{ content }}
	</div>
	<p><strong>Tags:</strong> {% if page.tags %}{{ page.tags | join: ", " }}{% endif %}</p>
</article>
